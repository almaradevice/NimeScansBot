<!DOCTYPE html>
<html lang="id" style="scroll-behavior:smooth;--tg-viewport-height:100vh;--tg-viewport-stable-height:100vh; cursor:pointer;" ondragstart="return false" oncontextmenu="return false">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="16x16">
    <title>[NIMESCANS] - Projects</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        *, :after, :before {box-sizing: border-box;border: 0 solid #e5e7eb}
        ::-webkit-scrollbar {width: 4px;height: 4px}
        ::-webkit-scrollbar-thumb {background-color: rgba(150, 150, 150, .3);border-radius: 20px;transition: background-color .3s ease}
        ::-webkit-scrollbar-track {background: transparent}
        .no-scrollbar ::-webkit-scrollbar, .no-scrollbar::-webkit-scrollbar {display: none !important;width: 0 !important;height: 0 !important}
        :root {
            --bg-dark: hsl(0 0% 3.9%);
            --ui-bg: rgba(0, 0, 0, 0.3);
            --modal-bg: #181818;
            --accent: #e74c3c;
            --text: hsl(0 0% 98%)
            --text-dim: #888888;
        }
        :host, html {
            line-height: 1.5;
            -webkit-text-size-adjust: 100%;
            -moz-tab-size: 4;
            tab-size: 4;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-style: normal;
            font-feature-settings: normal;
            font-variation-settings: normal;
            background-color: var(--bg-dark);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        body {margin: 0;}
        button {
            -webkit-appearance: button;
            background-color: transparent;
            background-image: none;
        }
        button, select {
            font-family: inherit;
            font-feature-settings: inherit;
            font-variation-settings: inherit;
            font-size: 100%;
            font-weight: inherit;
            line-height: inherit;
            letter-spacing: inherit;
            color: inherit;
            margin: 0;
            padding: 0;
            text-transform: none;
            cursor: pointer;
        }

        .transform {
            --tw-translate-x: 0;
            --tw-translate-y: 0;
            --tw-rotate: 0;
            --tw-skew-x: 0;
            --tw-skew-y: 0;
            --tw-scale-x: 1;
            --tw-scale-y: 1;
            transform: translate(var(--tw-translate-x), var(--tw-translate-y)) rotate(var(--tw-rotate)) skewX(var(--tw-skew-x)) skewY(var(--tw-skew-y)) scaleX(var(--tw-scale-x)) scaleY(var(--tw-scale-y));
        }
        .translate-x-16 {--tw-translate-x: 4rem}
        .-translate-y-16 {--tw-translate-y: -4rem}

        /* --- UI NAVIGATION (PILL) --- */
        #ui-chapters {
            position: fixed;
            left: 0px;
            right: 0px;
            top: 1.5rem;
            z-index: 50;
            display: flex;
            justify-content: center;
            transition-property: transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 0.3s;
        }

        .pill-nav {
            display: flex;
            align-items: center;
            height: 2rem;
            border-radius: 9999px;
            backdrop-filter: blur(12px);
            overflow: hidden;
            will-change: transform;
            background-color: var(--ui-bg);
            box-shadow: 0 0 0 0px #fff, 0 0 0 1px rgb(255 255 255/0.08), 0 1px 2px 0 rgb(0 0 0/0.05);
            color: rgba(255, 255, 255, 0.85);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 .625rem;
            gap: .25rem;
            font-size: 13px;
            font-weight: 500;
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(.4, 0, .2, 1);
            transition-duration: .15s;
        }

        /*.nav-btn:hover { color: var(--accent); }*/
        .divider {width: 2px; height: 0.875rem; flex-shrink: 0; background-color: rgba(255, 255, 255, 0.2)}

        /* --- UI ARROWS (SIDE NAV) --- */
        #ui-arrows {
            position: fixed;
            bottom: 4rem;
            right: 0.75rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            transition-property: transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 0.3s;
        }

        .scroll-top-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            white-space: nowrap;
            font-size: 8.025rem;
            line-height: 1.2rem;
            font-weight: 500;
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 0.15s;
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            border-width: 0px;
            backdrop-filter: blur(24px);
            background-color: var(--ui-bg);
            box-shadow: 0 0 0 0px #fff, 0 0 0 1px rgb(255 255 255/0.08), 0 1px 2px 0 rgb(0 0 0/0.05);
            color: rgba(255, 255, 255, 0.85);
            will-change: transform;
        }

        /* --- MODAL DAFTAR CHAPTER --- */
        .modal-content {
            color: rgba(255, 255, 255, 0.85);
            position: fixed;
            top: 4.75rem;
            left: 50%;
            --tw-translate-x: -50%;
            z-index: 61;
            width: 300px;
            max-height: 60vh;
            border-radius: 0.75rem;
            backdrop-filter: blur(12px);
            background-color: rgba(10, 10, 10, 0.95);
            box-shadow: 0 0 0 0px #fff, 0 0 0 2px rgb(255 255 255/0.08), 0 25px 50px -12px rgb(0 0 0/0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition-property: transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            transition-duration: 0.3s;
        }

        .modal-header {
            padding: 0.75rem 0.75rem;
            border-bottom: 1px solid #282828;
            font-size: 13px;
            font-weight: 600;
        }

        .modal-body {
            overflow-y: auto;
            flex: 1 1 0%;
        }

        .chapter-row {
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chapter-row:hover { background: #222; }
        .ch-badge {
            background: #252525;
            color: var(--text-dim);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            min-width: 25px;
            text-align: center;
        }

        /* --- MANGA VIEWER --- */
        #manga-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 5px;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        /* --- HELPERS --- */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="text/javascript">
        /* Coded by aqil.almara - t.me/prudentscitus © 2024 */
        if(!String.prototype.format){String.prototype.format=function(){var a=arguments;return this.replace(/{(\d+)}/g,function(m,n){return typeof a[n]!="undefined"?a[n]:m})}}
        function $(s){var d=document,t=(s.match(/<.*>/g)||[""])[0].slice(1,-1);s=t?d.createElement(t):d.querySelectorAll(s);return new Elements(typeof s==='object'?s:s)}

            width:function(w){return w?(this.e.style.width=`${w}px`,this):this.e.offsetWidth},
            height:function(h){return h?(this.e.style.height=`${h}px`,this):this.e.offsetHeight}
        };
        $.cookie=function(n,v,o){if(typeof v!="undefined"){o=o||{};if(v===null){v="";o.expires=-1}var e="";if(o.expires){var d;if(typeof o.expires=="number"){d=new Date();d.setHours(23,59,59);d.setDate(d.getDate()+o.expires)}else{d=o.expires}e=";expires="+d.toUTCString()}document.cookie=[n,"=",encodeURIComponent(v),e,";path="+(o.path||"/"),(o.domain?";domain="+o.domain:""),(o.secure?";secure":"")].join("")}else{var r=new RegExp("(?:; )?"+n+"=([^;]*);?");return r.test(document.cookie)?decodeURIComponent(RegExp.$1):null}};
        $.getSearchObject=function(){if(location.search==="")return{};var o={};location.search.substr(1).split("&").forEach(pair=>{var[k,v]=pair.split("=");k=decodeURIComponent(k),v=decodeURIComponent(v)||null;if(o[k]){if(!(o[k]instanceof Array))o[k]=[o[k]];o[k].push(v)}else o[k]=v});return o};
        $.createElements=(e,p)=>{e.forEach((e)=>{const t=document.createElement(e.tag);if(e.attrs){Object.keys(e.attrs).forEach((a)=>{t.setAttribute(a,e.attrs[a])})}if(e.children){e.children.forEach((c)=>{if(typeof c==="string"){t.innerHTML=c}else if(typeof c==="object"){$.createElements([c],t)}})}p.appendChild(t)})};
        $.createEvalCSS=(s,r)=>{const t=document.querySelector("style");if(t){t.insertAdjacentText("beforeend",`${s}{${r}}`)}else{console.error("No style element found.")}};
        $.view_ajax=(url)=>{return new Promise((resolve,reject)=>{fetch(url).then(response=>{if(!response.ok){throw new Error(`HTTP error! status: ${response.status}`)}return response.text()}).then(responseText=>{try{resolve(JSON.parse(responseText))}catch(error){reject(error.message)}}).catch(error=>{reject(error.message)})})}

        // document.onkeydown=(e)=>{if(e.ctrlKey&&e.shiftKey&&["C","J","I"].includes(e.key.toUpperCase())){return false}if(e.ctrlKey&&["C","S","U"].includes(e.key.toUpperCase())){return false}};
    </script>
</head>
<body>

    <div id="loading-overlay" style="visibility: visible;">
        <div class="spinner"></div>
        <p style="font-size: 12px; color: #888;">Memuat Chapter...</p>
    </div>

    <!-- UI Navigasi Atas -->
    <div id="ui-chapters" class="transform">
        <div class="pill-nav">
            <button id="prev-btn" class="nav-btn" onclick="navigateChapter('prev')">
                <span style="transform: rotate(180deg);display:inline-block">&#10148;</span>
                <span id="prev-label">-</span>
            </button>
            <div class="divider"></div>
            <button class="nav-btn" onclick="toggleModal()">
                <span>&#9776;</span>
                <span id="current-label">-</span>
                <span style="font-size:9px;opacity:0.6">&#9660;</span>
            </button>
            <div class="divider"></div>
            <button id="next-btn" class="nav-btn" onclick="navigateChapter('next')">
                <span id="next-label">-</span>
                <span>&#10148;</span>
            </button>
        </div>
    </div>

    <!-- UI Arrow Samping -->
    <div id="ui-arrows" class="transform">
        <button class="scroll-top-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <svg style="width:1.25rem;height:1.25rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m5 12 7-7 7 7 M12 19V5">
                </path>
            </svg>
        </button>
    </div>

    <!-- Modal Chapter -->
    <div id="chapter-modal" style="visibility: hidden;">
        <div style="position: fixed; inset: 0px; z-index: 60;" onclick="toggleModal()"></div>
        <div class="modal-content transform" onclick="event.stopPropagation()">
            <div class="modal-header">All Chapters (<span id="total-ch">0</span>)</div>
            <div class="modal-body" id="listContent"></div>
        </div>
    </div>

    <div id="manga-container"></div>
    <div id="chapter-end-anchor" style="height: 50px;"></div>

    <script>
        // DATA CHAPTER
        let chapterData = [
            { id: 1, title: "Chapter 1", url: "https://ar-hosting.pages.dev/1776014941503.pdf" },
            { id: 2, title: "Chapter 2", url: "https://ar-hosting.pages.dev/1776014877828.pdf" },
            { id: 3, title: "Chapter 3", url: "https://ar-hosting.pages.dev/1776014824132.pdf" }
        ];
        let currentIdx = 0;
        let lastSeenPage = 0;

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // --- FITUR NAVIGASI KLIK ---
        const handleNavigation = (event) => {
            // Abaikan jika klik di tombol atau menu modal
            if (event.target.closest('button') || event.target.closest('.modal-content')) return;

            const x = event.clientX;
            const width = window.innerWidth;
            const scrollAmount = window.innerHeight * 0.8;

            if (x < 0.3 * width) {
                // Sisi Kiri: Scroll Up
                window.scrollBy({ top: -scrollAmount, behavior: 'smooth' });
            } else if (x > 0.7 * width) {
                // Sisi Kanan: Scroll Down
                window.scrollBy({ top: scrollAmount, behavior: 'smooth' });
            } else {
                // Tengah: Toggle UI
                document.getElementById('ui-chapters').classList.toggle('-translate-y-16');
                document.getElementById('ui-arrows').classList.toggle('translate-x-16');
            }
        };

        // --- FITUR AUTO-HIDE UI SAAT SCROLL ---
        const uiChapter = document.getElementById('ui-chapters');
        const uiArrows = document.getElementById('ui-arrows');
        const endAnchor = document.getElementById('chapter-end-anchor');
        let lastScrollY = window.scrollY;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            // Jika scroll ke bawah dan belum sampai ujung
            if (currentScrollY > lastScrollY && currentScrollY > 50 && (currentScrollY + windowHeight + 50) <= endAnchor.offsetTop) {
                uiChapter.classList.add('-translate-y-16');
                uiArrows.classList.add('translate-x-16');
            } else {
                uiChapter.classList.remove('-translate-y-16');
                uiArrows.classList.remove('translate-x-16');
            }
            lastScrollY = currentScrollY;
            saveProgress()
        });

        document.addEventListener('click', handleNavigation);

        // --- CORE RENDERER ---
        async function loadManga(index) {
            const container = document.getElementById('manga-container');
            const loader = document.getElementById('loading-overlay');
            currentIdx = index;
            container.innerHTML = '';
            loader.style.display = 'flex';

            prevLabel = document.getElementById('prev-label')
            nextLabel = document.getElementById('next-label')
            prevBtn = document.getElementById('prev-btn')
            nextBtn = document.getElementById('next-btn')
            chapterData[index-1]
            ? (prevLabel.textContent = chapterData[index-1].id, prevBtn.style.opacity = '1')
            : (prevLabel.textContent = '-', prevBtn.style.opacity = '.1');
            document.getElementById('current-label').textContent = `Ch. ${chapterData[index].id}`;
            chapterData[index+1]
            ? (nextLabel.textContent = chapterData[index+1].id, nextBtn.style.opacity = '1')
            : (nextLabel.textContent = '-', nextBtn.style.opacity = '.1');
            window.scrollTo(0,0);
            saveProgress()
            // loader.style.visibility = 'hidden';
            // return

            try {
                // const proxyUrl = `?pdf_url=${encodeURIComponent(chapterData[index].url)}`;
                const proxyUrl = `/proxy-pdf?url=${encodeURIComponent(chapterData[index].url)}`;
                const response = await fetch(proxyUrl);
                const arrayBuffer = await response.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                loader.style.visibility = 'hidden';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    container.appendChild(canvas);

                    const viewport = page.getViewport({ scale: 2.0 });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                }
            } catch (err) {
                console.error(err);
                loader.innerHTML = "<p style='color:red'>Gagal Memuat File</p>";
            }
        }

        function navigateChapter(dir) {
            if (dir === 'next' && currentIdx < chapterData.length - 1) loadManga(currentIdx + 1);
            else if (dir === 'prev' && currentIdx > 0) loadManga(currentIdx - 1);
        }

        function toggleModal() {
            const m = document.getElementById('chapter-modal');
            m.style.visibility = (m.style.visibility === 'visible') ? 'hidden' : 'visible';
        }

        function initUI() {
            const list = document.getElementById('listContent');
            document.getElementById('total-ch').textContent = chapterData.length;
            chapterData.forEach((ch, index) => {
                const row = document.createElement('div');
                row.className = 'chapter-row';
                row.onclick = () => { loadManga(index); toggleModal(); };
                row.innerHTML = `<div class="ch-badge">${ch.id}</div><div style="font-size:14px">${ch.title}</div>`;
                list.prepend(row);
            });
        }
        function saveProgress() {
            const data = {
                current: currentIdx,
                y: window.scrollY,
                page: lastSeenPage
            };
            localStorage.setItem(`progress_${slug}`, JSON.stringify(data));
        }


        const slug = $.getSearchObject()['slug'] || 'classmate';
        console.log(slug);
        const saved = localStorage.getItem(`progress_${slug}`);
        fetch(`./${slug}.json`)
        .then(r=>r.ok ? r.json() : Promise.reject(`HTTP error! status: ${r.status}`))
        .then(j=>{
            chapterData = j;

            if (saved) {
                const p = JSON.parse(saved);
                currentIdx = p.current;
                lastSeenPage = p.page;
                document.body.style.minHeight = `${p.y}`
            }
            initUI();
            loadManga(currentIdx);
        })
        .catch(e=>console.error('Failed to fetch JSON:',e));
    </script>
</body>
</html>
